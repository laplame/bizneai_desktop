name: Build Linux

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build icons
        run: npm run generate-icons

      - name: Fix native dependencies
        run: npm run fix-deps

      - name: Build application
        run: npm run build

      - name: Bundle local API (Electron embedded)
        run: npm run build:server

      - name: Build Linux (AppImage + deb)
        run: npx electron-builder --linux --x64
        # No GH_TOKEN: evita que electron-builder intente publicar en Releases (usamos upload-artifact)

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BizneAI-POS-Linux
          path: release/
