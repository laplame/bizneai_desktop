name: Build Windows (PC)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build icons
        run: npm run generate-icons

      - name: Fix native dependencies
        run: npm run fix-deps

      - name: Build application
        run: npm run build

      - name: Bundle local API (Electron embedded)
        run: npm run build:server

      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Desactiva firma de código en CI (no hay certificado)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Local API executable (.exe)
        run: npm run build:local-api-exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BizneAI-POS-Windows
          path: release/
